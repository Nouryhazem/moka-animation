    <!-- Suppression styles for benign iframe sandbox errors -->
    <style>
      vite-error-overlay, [id^="vite-error-overlay"], .vite-error-overlay {
        display: none !important;
        opacity: 0 !important;
        visibility: hidden !important;
        pointer-events: none !important;
      }
    </style>

    <!-- Global catcher for WebSocket iframe warnings -->
    <script>
      (function() {
        const swallowBenignWebSocket = function(e) {
          try {
            var msg = e.message || "";
            var reasonMsg = (e.reason && (e.reason.message || String(e.reason))) || "";
            var combined = (msg + " " + reasonMsg).toLowerCase();
            if (
              combined.indexOf("websocket") > -1 || 
              combined.indexOf("ws://") > -1 || 
              combined.indexOf("sockjs") > -1 ||
              combined.indexOf("closed without opened") > -1
            ) {
              e.preventDefault();
              if (e.stopPropagation) e.stopPropagation();
              if (e.stopImmediatePropagation) e.stopImmediatePropagation();
              return true;
            }
          } catch (err) {}
        };
        window.addEventListener('error', swallowBenignWebSocket, { capture: true });
        window.addEventListener('unhandledrejection', swallowBenignWebSocket, { capture: true });
      })();
    </script>

    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- DNS Prefetch / Preconnect for rapid connection handshakes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <!-- High priority Preload of critical typography stylesheets -->

    <!-- Actual stylesheets linked so they load concurrently -->
